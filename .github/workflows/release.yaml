name: release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release
        required: true

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
      attestations: write
    env:
      MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
      MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
      MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
      MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
      MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"
          owner: "${{ github.repository_owner }}"
          # Scope the installation token to release publishing: tag checkout and
          # release upload here, plus the formula/package bump commits
          # GoReleaser's homebrew and nix pipes push to homebrew-tap and
          # nur-packages.
          permission-contents: write
          repositories: |
            kat
            homebrew-tap
            nur-packages

      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: "${{ steps.app-token.outputs.token }}"
          ref: ${{ github.event.inputs.tag != '' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Determine tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            echo "value=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture OIDC request URL
        id: oidc
        run: echo "request-url=$ACTIONS_ID_TOKEN_REQUEST_URL" >> "$GITHUB_OUTPUT"

      - name: Release via Dagger
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "v0.21.4"
          call: >-
            ci release
            --github-token=env://GITHUB_TOKEN
            --registry-username="${{ github.actor }}"
            --registry-password=env://REGISTRY_PASSWORD
            --tag="${{ steps.tag.outputs.value }}"
            --oidc-request-url="${{ steps.oidc.outputs.request-url }}"
            --oidc-request-token=env://ACTIONS_ID_TOKEN_REQUEST_TOKEN
            --macos-sign-p12=env://MACOS_SIGN_P12
            --macos-sign-password=env://MACOS_SIGN_PASSWORD
            --macos-notary-key=env://MACOS_NOTARY_KEY
            --macos-notary-key-id=env://MACOS_NOTARY_KEY_ID
            --macos-notary-issuer-id=env://MACOS_NOTARY_ISSUER_ID
            dist --output=./dist
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          enable-github-summary: "true"
        env:
          GITHUB_TOKEN: "${{ steps.app-token.outputs.token }}"
          REGISTRY_PASSWORD: "${{ secrets.GITHUB_TOKEN }}"

      - name: Attest Build Provenance (checksums.txt)
        uses: actions/attest-build-provenance@v3
        with:
          subject-checksums: ./dist/checksums.txt

      - name: Attest Build Provenance (digests.txt)
        uses: actions/attest-build-provenance@v3
        with:
          subject-checksums: ./dist/digests.txt
